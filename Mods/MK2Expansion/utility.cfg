    @entryCost = 9400
    @cost = 1500

    @MODULE[ModuleDockingNode]
    {
        @nodeType = Armor1875
    }

    %MODULE[TweakScale]
    {
        type = stack
        defaultScale = 1.875
    }
}

@PART[M2X_Mk2BatteryBank]:Final
{
    %rescaleFactor = 1.5
    @cost = 50 // 1000/KHW, ×2 for scale
    @RESOURCE[ElectricCharge]
    {
        @amount = 84375
        @maxAmount = 84375    // 250WH/kg, ×3.375 for scale
    }
    @mass = 0.24
    @entryCost = 20400
    %MODULE[TweakScale]
    {
        %type = stack
        %defaultScale = 1.875
    }
}

