// Modified 2026-06-09
// H-VR "J Edgar" VTOL Engine — ×1.5 scale integrated

@PART[M2X_HeavyVTOL]:FINAL
{
    %rescaleFactor = 1.5
    @mass = 4.5
    @entryCost = 300000
    @cost = 77000

    @MODULE[ModuleEnginesFX]
    {
        !atmosphereCurve {}
        @maxThrust = 563
        @heatProduction = 84
        atmosphereCurve
        {
            key = 0 7590 0 0
        }
    }

    @MODULE[ModuleResourceIntake]
    {
        @area = 0.01125
    }
    @RESOURCE[IntakeAir]
    {
        @amount = 1.688
        @maxAmount = 1.688
    }
}
