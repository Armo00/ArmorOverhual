// Modified 2026-06-09
// LF-1 "Banshee" Stack Lift Fan
// ×1.5 scale — no existing overhaul

@PART[M2X_LiftFan]:FINAL
{
    %rescaleFactor = 1.5
    @mass = 1.2
    @cost = 1680
    @entryCost = 7400

    @MODULE[ModuleEnginesFX]
    {
        @maxThrust = 315
        @heatProduction = 42
        !atmosphereCurve {}
        atmosphereCurve
        {
            key = 0 10925
        }
    }
    @MODULE[ModuleResourceIntake]
    {
        @area = 0.09
    }
    @RESOURCE[FanIntakeAir]
    {
        @amount = 11.475
        @maxAmount = 11.475
    }
    %MODULE[TweakScale]
    {
        %type = stack
        %defaultScale = 1.875
    }
}
