// Modified 2026-06-09
// X-44 M.A.T.T.O.C.K. Engine — ×1.5 scale integrated
// Open Cycle engine

@PART[M2X_MATTOCKv2]:FINAL
{
    %rescaleFactor = 1.5
    @entryCost = 180000
    @cost = 72000
    @mass = 5.0

    %MODULE[TweakScale]
    {
        type = stack
        defaultScale = 1.875
    }

    @MODULE[ModuleEngines*]:HAS[#engineID[AirBreathing]]
    {
        @maxThrust = 743
        @heatProduction = 168
        !PROPELLANT,*{}
        PROPELLANT
        {
            name = LqdMethane
            resourceFlowMode = STAGE_STACK_FLOW_BALANCE
            ratio = 1.0
            DrawGauge = true
        }
        PROPELLANT
        {
            name = IntakeAtm
            ratio = 1.2
            ignoreForIsp = True
        }
        !atmosphereCurve {}
        atmosphereCurve
        {
            key = 0 3565
        }

    }

    @MODULE[ModuleEngines*]:HAS[#engineID[ClosedCycle]]
    {
        @maxThrust = 945
        @heatProduction = 336
        !PROPELLANT,*{}
        PROPELLANT
        {
            name = LqdMethane
            resourceFlowMode = STAGE_STACK_FLOW_BALANCE
            ratio = 0.4137
            DrawGauge = true
        }
        PROPELLANT
        {
            name = LqdOxygen
            resourceFlowMode = STAGE_STACK_FLOW_BALANCE
            ratio = 0.5863
        }
        !atmosphereCurve {}
        atmosphereCurve
        {
            key = 0 355
            key = 1 265
            key = 9 0.001
        }
    }
}
