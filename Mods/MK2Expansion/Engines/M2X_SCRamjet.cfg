// Modified 2026-06-09
// J-90 "Banshee" Scramjet Engine
// ×1.5 scale — no existing overhaul

@PART[M2X_SCRamjet]:FINAL
{
    %rescaleFactor = 1.5
    @mass = 5.2
    @cost = 63000
    @entryCost = 1244000

    @MODULE[ModuleEnginesFX]
    {
        @maxThrust = 248
        @heatProduction = 252
        !atmosphereCurve {}
        atmosphereCurve
        {
            key = 0 2300 0 0
        }
    }
    @MODULE[ModuleResourceIntake]
    {
        @area = 0.045
    }
    %MODULE[TweakScale]
    {
        %type = stack
        %defaultScale = 1.875
    }
}
