// Modified 2026-06-09
// Z0-OM E.S.T.O.C. Engine — ×1.5 scale integrated

@PART[M2X_ESTOCv2]:FINAL
{
    %rescaleFactor = 1.5
    @entryCost = 180000
    @cost = 48000
    @mass = 4.4

    %MODULE[TweakScale]
    {
        type = stack
        defaultScale = 1.875
    }

    @MODULE[ModuleEngines*]:HAS[#engineID[AirBreathing]]
    {
        @maxThrust = 675
        @heatProduction = 147
        !PROPELLANT,*{}
        PROPELLANT
        {
            name = LqdMethane
            resourceFlowMode = STAGE_STACK_FLOW_BALANCE
            ratio = 1.0
            DrawGauge = true
        }
        PROPELLANT
        {
            name = IntakeAtm
            ratio = 1.2
            ignoreForIsp = True
        }
        !atmosphereCurve {}
        atmosphereCurve
        {
            key = 0 4255
        }

    }

    @MODULE[ModuleEngines*]:HAS[#engineID[ClosedCycle]]
    {
        @maxThrust = 810
        @heatProduction = 315
        !PROPELLANT,*{}
        PROPELLANT
        {
            name = LqdMethane
            resourceFlowMode = STAGE_STACK_FLOW_BALANCE
            ratio = 0.4137
            DrawGauge = true
        }
        PROPELLANT
        {
            name = LqdOxygen
            resourceFlowMode = STAGE_STACK_FLOW_BALANCE
            ratio = 0.5863
        }
        !atmosphereCurve {}
        atmosphereCurve
        {
            key = 0 345
            key = 1 310
            key = 9 0.001
        }
    }
}
