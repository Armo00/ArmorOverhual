// Modified 2026-06-09
// EEP-13 "Spirit" Ion Thruster — ×1.5 scale integrated

@PART[M2X_IonEngine]:Final
{
    %rescaleFactor = 1.5
    @mass = 2.4
    @entryCost = 1680000
    @cost = 180000
    @MODULE[ModuleEnginesFX]
    {
        @maxThrust = 30
        @heatProduction = 92
        !PROPELLANT,*{}
        PROPELLANT
        {
            name = ElectricCharge
            ratio = 1.0
            DrawGauge = True
            minResToLeave = 1.0
        }
        PROPELLANT
        {
            name = XenonGas
            ratio = 1.0
            DrawGauge = True
        }
        @atmosphereCurve
        {
            @key,0 = 0 16500
            @key,1 = 1 334
            @key,3 = 5 1
        }
    }
}
