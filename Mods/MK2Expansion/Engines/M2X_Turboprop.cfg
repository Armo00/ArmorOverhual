// Modified 2026-06-09
// TP-1 "Kraken" Turboprop Engine
// ×1.5 scale — no existing overhaul

@PART[M2X_Turboprop]:FINAL
{
    %rescaleFactor = 1.5
    @mass = 2.8
    @cost = 680
    @entryCost = 7400

    @MODULE[ModuleEnginesFX]
    {
        @maxThrust = 158
        @heatProduction = 63
        !atmosphereCurve {}
        atmosphereCurve
        {
            key = 0 10925
        }
    }
    @MODULE[ModuleResourceIntake]
    {
        @area = 0.018
    }
    @RESOURCE[IntakeAir]
    {
        @amount = 0.675
        @maxAmount = 0.675
    }
    %MODULE[TweakScale]
    {
        %type = stack
        %defaultScale = 1.875
    }
}
