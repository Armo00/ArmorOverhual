// Modified 2026-06-09
// MK2 family ×1.5 scale — 5 cockpits

@PART[M2X_DropshipCockpit|M2X_BladeCockpit|M2X_TunaCockpit|M2X_RavenCockpit|M2X_ViperCockpit]:Final
{
    %rescaleFactor = 1.5

    @MODULE[ModuleCommand]
    {
        @minimumCrew = 0
        RESOURCE
        {
            name = ElectricCharge
            rate = 0.1  //360w
        }
    }

    !RESOURCE,*{}
    !MODULE[ModuleFuelTanks] {}
    !MODULE[RasterPropMonitorComputer] {}
    MODULE:NEEDS[RasterPropMonitor]
    {
        name = RasterPropMonitorComputer
        storedStrings = v 0.9.0|2023.12.01|    Welcome aboard   |  CNSA
        // = (0)<version> |(1) <date> |(2) <name for MFD STBY screen & Flight Books. 18 char max>| (3,4)<full name (2 lines)> |(5) < version of flight books, manuals...>|(6) <short name> |(7) Company
    }
    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 675
        basemass = -1
        //  Lifesupport rated for 3 days for each crew member
        TANK
        {
            name = Food
            amount = Full
            maxAmount = 5.84928
            @maxAmount *= 3
            @maxAmount *= #$/CrewCapacity$
         }

        TANK
        {
            name = Water
            amount = Full
            maxAmount = 3.87072
            @maxAmount *= 3
            @maxAmount *= #$/CrewCapacity$
         }

        TANK
        {
            name = Oxygen
            amount = Full
            maxAmount = 591.84
            @maxAmount *= 3
            @maxAmount *= #$/CrewCapacity$
         }

        TANK
        {
            name = ElectricCharge
            amount = Full
            maxAmount = 3060
            @maxAmount *= 3
            @maxAmount *= #$/CrewCapacity$
        }
    }

    %MODULE[TweakScale]
    {
        %type = stack
        %defaultScale = 1.875
    }
}


// --- M2X_DropshipCockpit — Angler Cockpit ---
@PART[M2X_DropshipCockpit]:FINAL
{
    @mass = 1.6
    @cost = 6200
    @entryCost = 44700
    @RESOURCE[ElectricCharge]
    {
        @amount = 675
        @maxAmount = 675
    }
    @RESOURCE[MonoPropellant]
    {
        @amount = 68
        @maxAmount = 68
    }
    @MODULE[ModuleReactionWheel]
    {
        @PitchTorque = 34
        @YawTorque = 34
        @RollTorque = 34
    }
    @MODULE[ModuleInventoryPart]
    {
        @InventorySlots = 3
        @packedVolumeLimit = 253
    }
}

