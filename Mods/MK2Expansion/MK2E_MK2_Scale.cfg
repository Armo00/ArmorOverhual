// Modified 2026-06-09
// MK2 family rescaleFactor ×1.5 — Mk2 Expansion parts NOT covered by existing patches
// Covers: Aero (8), Structural (10), FuelTank (10), Utility-unpatched (6)
// Total: 34 parts
// All values manually calculated; no MM arithmetic used.

// ============================================================
// rescaleFactor — per-mod batch (34 non-engine M2X mk2 parts)
// ============================================================
@PART[M2X_InlineIntake|M2X_AeroIntake|M2X_circularintake|M2X_EngineShroud|M2X_MantaIntake|M2X_Precooler|M2X_Shockcone|M2X_Tailboom|M2X_Decoupler|M2X_Endcap|M2X_LHub|M2X_THub|M2X_XHub|M2X_RadialMountA|M2X_RadialMountB|M2X_StructuralTube|M2X_StructuralAdapterS|M2X_StructuralAdapterLong|M2X_Shortbicoupler|M2X_HypersonicNose|M2X_InverterFuselage|M2X_linearTricoupler|M2X_Mk2bicoupler|M2X_SupersonicNose|M2X_Short25adapter|M2X_SpadeTail|M2X_625tricoupler|M2X_SlantAdapterS|M2X_AligningDockingPort|M2X_ShieldedDockingPort|M2X_cargoContainer|M2X_Nosebay|M2X_Reactor|M2X_Servicebay]:FINAL
{
    %rescaleFactor = 1.5
}

