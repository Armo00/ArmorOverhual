// --- M2X_InlineIntake — Inline Intake ---
// Has LF=180 → FC Rule 2 → MFT Fuselage volume=900 → target 3038
@PART[M2X_InlineIntake]:FINAL
{
    @mass = 0.70
    @cost = 3110
    @entryCost = 19000
    @MODULE[ModuleResourceIntake]
    {
        @area = 0.03375
    }
    @RESOURCE[IntakeAir]
    {
        @amount = 6.75
        @maxAmount = 6.75
    }
    @thermalMassModifier = 4.0
    @MODULE[ModuleFuelTanks]
    {
        @volume = 3038
    }
    %MODULE[TweakScale]
    {
        %type = stack
        %defaultScale = 1.875
    }
}

