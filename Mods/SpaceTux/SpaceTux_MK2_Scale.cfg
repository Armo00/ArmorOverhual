// Modified 2026-06-09
// MK2 family rescaleFactor ×1.5 — SpaceTux RecycledParts (9 parts)
// Note: lowercase mk2* parts get rescaleFactor=1.5 + entryCost×5 from SquadPartsOverhaul/mk2_general.cfg wildcard.
// MK2Cont4/8 (uppercase) need explicit rescaleFactor. entryCost values below are final (stock ×5 ×2 for lowercase, stock ×2 for uppercase).

// ============================================================
// rescaleFactor — MK2Cont4/8 only (lowercase mk2* handled by SquadPartsOverhaul wildcard)
// ============================================================
@PART[MK2Cont4|MK2Cont8]:FINAL
{
    %rescaleFactor = 1.5
}

// ============================================================
// mk2Separator — Mk2 Separator
// entryCost: stock 7600 ×5 (wildcard) ×2 (scale) = 76000
// ============================================================
@PART[mk2Separator]:FINAL
{
    %rescaleFactor = 1.5
    @maxTemp = 2500
    %skinMaxTemp = 3600
    @mass = 0.19
    @cost = 1480
    @entryCost = 76000
    %MODULE[TweakScale]
    {
        %type = stack
        %defaultScale = 1.875
    }
}

