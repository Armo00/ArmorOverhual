+PART[KCLV_YF100]:NEEDS[RealFuels]:FINAL
{
    @name = KCLV_YF150
    @title = YF-150
    @description = YF-150 is a high-thrust oxidizer-rich staged combustion kerolox engine derived from YF-100. It trades some envelope size for a more compact package while increasing thrust and maintaining deep throttling capability.
    @manufacturer = CASC
    @rescaleFactor = 0.7462686567164179
    @mass = 1.799
    @cost = 4000
    @entryCost = 360000
    @maxTemp = 2200
    %bodyLiftMultiplier = 0.1
    %TechRequired = advancedOxidizerRichStagedCombustionCycelEngine
    %bulkheadProfiles = size1, srf
    @tags ^= :$: YF-150:

    !MODULE[TweakScale] {}
    %MODULE[TweakScale]
    {
        %type = stack
        %defaultScale = 1.25
    }

    @MODULE[ModuleEngines*]
    {
        @name = ModuleEnginesRF
    }

    !MODULE[ModuleEngineConfigs],*{}
    !MODULE[ModuleAlternator],*{}
    !RESOURCE,*{}

    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleEngines
        configuration = YF-150 100%
        origMass = 1.799
        modded = false
        CONFIG
        {
            name = YF-150 100%
            description = A compact high-thrust derivative of YF-100 with a smaller envelope, deeper throttling, and substantially increased thrust. 100%: 1655.84 kN.
            minThrust = 579.54
            maxThrust = 1655.84
            heatProduction = 100
            massMult = 1.0
            cost = 0
            gimbalRange = 8.0
            %ullage = True
            %pressureFed = False
            %ignitions = 20
            PROPELLANT
            {
                name = Kerosene
                ratio = 0.3487
                DrawGauge = true
            }
            PROPELLANT
            {
                name = LqdOxygen
                ratio = 0.6513
            }
            atmosphereCurve
            {
                key = 0 340
                key = 1 308
            }
            IGNITOR_RESOURCE
            {
                name = ElectricCharge
                amount = 1.0
            }
            IGNITOR_RESOURCE
            {
                name = TEATEB
                amount = 0.05
            }
        }
        CONFIG
        {
            name = YF-150 110%
            description = An uprated operating point for YF-150. 100%: 1655.84 kN, 110%: 1821.43 kN.
            minThrust = 579.54
            maxThrust = 1821.43
            heatProduction = 100
            massMult = 1.0
            cost = 200
            gimbalRange = 8.0
            %ullage = True
            %pressureFed = False
            %ignitions = 20
            PROPELLANT
            {
                name = Kerosene
                ratio = 0.3487
                DrawGauge = true
            }
            PROPELLANT
            {
                name = LqdOxygen
                ratio = 0.6513
            }
            atmosphereCurve
            {
                key = 0 340
                key = 1 308
            }
            IGNITOR_RESOURCE
            {
                name = ElectricCharge
                amount = 1.0
            }
            IGNITOR_RESOURCE
            {
                name = TEATEB
                amount = 0.05
            }
        }
    }

    RESOURCE
    {
        name = TEATEB
        amount = 1.0
        maxAmount = 1.0
    }
}

@PART[KCLV_YF150]:NEEDS[Waterfall]:FINAL
{
    !EFFECTS {}
    EFFECTS
    {
        running_closed
        {
            AUDIO
            {
                channel = Ship
                clip = Waterfall/Sounds/EnsouSounds/Loop_Liquid_Heavy_High_2
                volume = 0.0 0.0
                volume = 0.01 0.4
                volume = 1.0 4.5
                pitch = 0.0 1
                pitch = 1.0 1
                loop = true
            }
            PREFAB_PARTICLE
            {
                prefabName = fx_smokeTrail_veryLarge
                transformName = smokePoint
                emission = 0.0 0.0
                emission = 0.05 0.0
                emission = 0.075 0.25
                emission = 1.0 1.25
                speed = 0.0 0.25
                speed = 1.0 1.0
                localOffset = 0, 0, 1
            }
        }
        engage
        {
            AUDIO
            {
                channel = Ship
                clip = Waterfall/Sounds/KW/sound_liq4
                volume = 1.0
                pitch = 1.75
                loop = false
            }
        }
        disengage
        {
            AUDIO
            {
                channel = Ship
                clip = sound_vent_soft
                volume = 1.0
                pitch = 2.0
                loop = false
            }
        }
        flameout
        {
            AUDIO
            {
                channel = Ship
                clip = sound_explosion_low
                volume = 1.0
                pitch = 2.0
                loop = false
            }
        }
    }

    !MODULE[ModuleWaterfallFX],*{}
    MODULE
    {
        name = ModuleWaterfallFX
        moduleID = YF150_Engine

        CONTROLLER
        {
            name = atmosphereDepth
            linkedTo = atmosphere_density
        }
        CONTROLLER
        {
            name = throttle
            linkedTo = throttle
            engineID = basicEngine
            responseRateUp = 0.02
            responseRateDown = 0.1
        }
        CONTROLLER
        {
            name = random
            linkedTo = random
            range = 0,1
        }

        TEMPLATE
        {
            templateName = YF-100_template_new_3
            overrideParentTransform = thrustTransform
            glow = _yellow
            position = 0,0,0
            rotation = 0, 0, 0
            scale = 3, 3, 4.5
            @scale[*] *= #$/rescaleFactor$
        }
    }
}

@PART[KCLV_YF150]:NEEDS[VABOrganizer]:FINAL
{
    %VABORGANIZER
    {
        %organizerSubcategory = KeroloxEngines
    }
}
