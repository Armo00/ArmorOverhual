// RS-25 Space Shuttle Main Engine Family
// Modified 2026-06-02
// Alternate timeline: STS → CERV → Vulture
// RS-25 (Block II):   ISP 366/452.3  Thrust 1357-2319.9  mass 3.177  TWR 74.51
// RS-25DX (CERV):     ISP 367/453    Thrust 1274-2379    mass 2.950  TWR 82.3
// RS-25EX (Vulture):  ISP 380/454    Thrust 1265-2812    mass 2.880  TWR 99.5

@PART[sse-engine-1-a|sse-engine-1-s]:Final
{
    @attachRules = 1,1,1,1,0
    %category = Engine
    @rescaleFactor = 2.4
    @mass = 2.95
    @entryCost = 160000
    @cost = 15000
    @maxTemp = 3200
    %title = RS-25 Space Shuttle Main Engine
    %TechRequired = improvedFuelRichStagedCombustionCycelEngine
    %manufacturer = Rocketdyne
    %description = The RS-25 (SSME) is a LH2/LOX fuel-rich staged combustion engine. Over decades of iteration—from STS Block II through CERV's DX to Vulture's EX—it remained the backbone of the shuttle lineage. This part includes all three major production variants selectable via engine config.

    @MODULE[ModuleEngines*]
    {
        @name = ModuleEnginesRF
    }

    %MODULE[TweakScale]
    {
        %type = stack
        %defaultScale = 2.4
    }

    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleEngines
        configuration = RS-25D
        origMass = 2.95

        CONFIG
        {
            name = RS-25D
            description = Block II SSME. Rated up to 111% thrust in an emergency. Original STS-era production standard.
            minThrust = 1357
            maxThrust = 2319.9
            heatProduction = 25
            massMult = 1.076
            ullage = True
            pressureFed = False
            ignitions = 3
            cost = 0
            IGNITOR_RESOURCE
            {
                name = ElectricCharge
                amount = 3
            }
            atmosphereCurve
            {
                key = 0 452.3
                key = 1 366
            }
            PROPELLANT
            {
                name = LqdHydrogen
                ratio = 0.7276
                DrawGauge = true
            }
            PROPELLANT
            {
                name = LqdOxygen
                ratio = 0.2724
            }
        }

        CONFIG
        {
            name = RS-25DX
            description = CERV-era RS-25, 2010 technology freeze. 111% rated as nominal with FADEC digital control, magnetic turbopump bearings, and extended ignition life for reusability. Bolt-on segmented nozzle for in-field maintenance.
            minThrust = 1274
            maxThrust = 2379
            heatProduction = 22
            massMult = 1.0
            ullage = True
            pressureFed = False
            ignitions = 12
            cost = 3000
            IGNITOR_RESOURCE
            {
                name = ElectricCharge
                amount = 2.5
            }
            atmosphereCurve
            {
                key = 0 453
                key = 1 367
            }
            PROPELLANT
            {
                name = LqdHydrogen
                ratio = 0.7276
                DrawGauge = true
            }
            PROPELLANT
            {
                name = LqdOxygen
                ratio = 0.2724
            }
        }

        CONFIG
        {
            name = RS-25EX
            description = Vulture-era RS-25, 2030 technology freeze. Chamber pressure raised to 26 MPa. CMC turbine blades, fully 3D-printed thrust chamber with conformal cooling channels, wireless MEMS sensor network, and laser ignition. Variable-area pintle injector enables 45% deep throttling. Same physical envelope as all RS-25 variants.
            minThrust = 1265
            maxThrust = 2812
            heatProduction = 26
            massMult = 0.976
            ullage = True
            pressureFed = False
            ignitions = 50
            cost = 6000
            IGNITOR_RESOURCE
            {
                name = ElectricCharge
                amount = 1.8
            }
            atmosphereCurve
            {
                key = 0 454
                key = 1 380
            }
            PROPELLANT
            {
                name = LqdHydrogen
                ratio = 0.7276
                DrawGauge = true
            }
            PROPELLANT
            {
                name = LqdOxygen
                ratio = 0.2724
            }
        }
    }
}

@PART[sse-engine-1-a]:Final
{
    %title = RS-25 Space Shuttle Main Engine
    @rescaleFactor = 2.2
    %node_attach = 0.0, 1.5, 0.0, 0.0, 1.0, 0.22, 1
}

@PART[sse-engine-1-s]:Final
{
    %title = RS-25 Engine (Straight)
}
