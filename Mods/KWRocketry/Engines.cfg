@PART[KW1mengineWildCatV|KW3mengineWildcatXR|KW1mengineMaverick1D|KW2mengineMaverickV|KW1mengineVestaVR1|KW2mengineVestaVR9D|KW2mengineGriffonG8D|KW3mengineGriffonXX|KW5mengineGriffonC|KW3mengineTitanT1|KW5mengineTitanV|KW2mengineSPS]:NEEDS[KWRocketry,RealFuels]:FINAL
{
    %attachRules = 1,1,1,1,0
    %node_attach = #$node_stack_top$
    %bulkheadProfiles = size2
    !RESOURCE,*{}
    !MODULE[ModuleAlternator],*{}
    !MODULE[ModuleEngineConfigs],*{}

    @MODULE[ModuleEngines*]
    {
        @name = ModuleEnginesRF
        %allowShutdown = True
        %throttleLocked = False
    }
}

@PART[KW1mengineWildCatV]:NEEDS[KWRocketry,RealFuels]:FINAL
{
    @mass = 0.717
    @entryCost = 120000
    @cost = 1600
    %TechRequired = improvedGGEngine

    @MODULE[ModuleGimbal]
    {
        @gimbalRange = 5.0
    }

    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleEngines
        configuration = Wildcat-110
        origMass = 0.717

        CONFIG
        {z
            name = Wildcat-110
            description = Kerolox gas-generator booster engine. TWR: 170.16
            minThrust = 419
            maxThrust = 1196
            heatProduction = 11.96
            massMult = 1.0
            ullage = True
            pressureFed = False
            ignitions = 5
            IGNITOR_RESOURCE
            {
                name = ElectricCharge
                amount = 1.2
            }
            PROPELLANT
            {
                name = Kerosene
                ratio = 37.694087
                DrawGauge = True
            }
            PROPELLANT
            {
                name = LqdOxygen
                ratio = 62.305913
            }
            atmosphereCurve
            {
                key = 0 313
                key = 1 285
            }
        }
    }
}

