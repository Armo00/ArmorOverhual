@PART[KWsrbGlobeI|KWsrbGlobeV|KWsrbGlobeVI|KWsrbGlobeX|KWsrbGlobeX2|KWsrbGlobeX5|KWsrbGlobeX10S|KWsrbGlobeX10L|KWsrbUllage|KWsrbUllageLarge]:NEEDS[KWRocketry,RealFuels]:FINAL
{
    !RESOURCE,*{}
    !MODULE[ModuleFuelTanks],*{}
    !MODULE[ModuleEngineConfigs],*{}

    @MODULE[ModuleEngines*]
    {
        @name = ModuleEnginesRF
        %EngineType = SolidBooster
        %allowShutdown = False
        %throttleLocked = True
        !PROPELLANT,*{}
    }
}

@PART[KWsrbGlobeI]:NEEDS[KWRocketry,RealFuels]:FINAL
{
    @mass = 0.45
    @entryCost = 2000
    @cost = 450
    %TechRequired = simpleSolidRocketMotor

    @MODULE[ModuleGimbal]
    {
        @gimbalRange = 1.0
    }

    MODULE
    {
        name = ModuleFuelTanks
        type = PBAN
        volume = 2257.3363
        basemass = -1
        TANK
        {
            name = PBAN
            amount = Full
            maxAmount = 2257.3363
        }
    }

    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleEngines
        configuration = Globe-I
        origMass = 0.45

        CONFIG
        {
            name = Globe-I
            minThrust = 150
            maxThrust = 150
            heatProduction = 100
            massMult = 1.0
            gimbalRange = 1.0
            PROPELLANT
            {
                name = PBAN
                ratio = 1.0
                DrawGauge = True
            }
            atmosphereCurve
            {
                key = 0 250
                key = 1 235
            }
            curveResource = PBAN
        }
    }
}

