@PART[KWsrbGlobeI|KWsrbGlobeV|KWsrbGlobeVI|KWsrbGlobeX|KWsrbGlobeX2|KWsrbGlobeX5|KWsrbGlobeX10S|KWsrbGlobeX10L|KWsrbUllage|KWsrbUllageLarge]:NEEDS[KWRocketry,Waterfall]:FINAL
{
    !EFFECTS,*{}
    !MODULE[ModuleWaterfallFX],*{}

    @MODULE[ModuleEngines*]
    {
        @runningEffectName = running_closed
    }
}

@PART[KWsrbGlobeI|KWsrbGlobeV|KWsrbGlobeVI]:NEEDS[KWRocketry,Waterfall]:FINAL
{
    EFFECTS
    {
        running_closed
        {
            AUDIO
            {
                channel = Ship
                clip = sound_rocket_hard
                volume = 0.0 0.0
                volume = 1.0 0.75
                pitch = 0.0 0.8
                pitch = 1.0 1.15
                loop = true
            }
        }
        engage
        {
            AUDIO
            {
                channel = Ship
                clip = sound_rocket_hard
                volume = 1.0
                pitch = 1.1
                loop = false
            }
        }
        flameout
        {
            PREFAB_PARTICLE
            {
                prefabName = fx_exhaustSparks_flameout_2
                transformName = NozzleTransform
                oneShot = true
            }
            AUDIO
            {
                channel = Ship
                clip = sound_explosion_low
                volume = 1.0
                pitch = 0.8
                loop = false
            }
        }
    }
}

