@PART[KW1mengineWildCatV|KW3mengineWildcatXR|KW1mengineMaverick1D|KW2mengineMaverickV|KW1mengineVestaVR1|KW2mengineVestaVR9D|KW2mengineGriffonG8D|KW3mengineGriffonXX|KW5mengineGriffonC|KW3mengineTitanT1|KW5mengineTitanV|KW2mengineSPS]:NEEDS[KWRocketry,Waterfall]:FINAL
{
    !EFFECTS,*{}
    !MODULE[ModuleWaterfallFX],*{}

    @MODULE[ModuleEngines*]
    {
        @runningEffectName = running_closed
    }
}

@PART[KW1mengineWildCatV|KW1mengineVestaVR1]:NEEDS[KWRocketry,Waterfall]:FINAL
{
    EFFECTS
    {
        running_closed
        {
            AUDIO
            {
                channel = Ship
                clip = Waterfall/Sounds/Beale_Sounds/Sound_RocketRook
                volume = 0.0 0.0
                volume = 1.0 1.0
                pitch = 0.0 0.2
                pitch = 1.0 1.0
                loop = true
            }
        }
        engage
        {
            AUDIO
            {
                channel = Ship
                clip = Waterfall/Sounds/KW/sound_liq3
                volume = 1.0
                pitch = 2.0
                loop = false
            }
        }
        disengage
        {
            AUDIO
            {
                channel = Ship
                clip = sound_vent_soft
                volume = 1.0
                pitch = 2.0
                loop = false
            }
        }
        flameout
        {
            PREFAB_PARTICLE
            {
                prefabName = fx_exhaustSparks_flameout_2
                transformName = NozzleTransform
                oneShot = true
            }
            AUDIO
            {
                channel = Ship
                clip = sound_explosion_low
                volume = 1.0
                pitch = 2.0
                loop = false
            }
        }
    }
}

