@PART[JetEngine]:Final
{
    @mass = 0.85
    @MODULE[ModuleEnginesFX]
    {
        @maxThrust = 90
        !atmosphereCurve {}
        atmosphereCurve
        {
            key = 0 9500 0 0
        }
        @PROPELLANT[IntakeAir]
        {
            @ratio = 10
        }
        !velCurve {}
        velCurve
        {
            key = 0 1 0 0
            key = 0.3 0.96 0 0
            key = 0.6 0.85 0 0
            key = 0.9 0.84 0 0
            key = 1.3 0.84 0 0
            key = 1.674 0.84 -0.876726 -0.876726
            key = 2.5 0 0 0
        }
    }
}

+PART[JetEngine]:Final
{
    @name = JetEngineCFMLeap
    %rescaleFactor = 1.6
    @title = CFM Leap-1A Turbofan Engine
    @description = The CFM Leap is a high-bypass turbofan engine used on commercial airliners. It provides high efficiency and low noise, making it ideal for long-haul flights.
    @mass = 2.4
    @cost = 15000
    @entryCost = 1500000
    %bulkheadProfiles = size2_00

    %MODULE[TweakScale]
    {
        %type = stack
        %defaultScale = 2.0
    }

    @MODULE[ModuleEnginesFX]
    {
        @maxThrust = 143.05
        !atmosphereCurve {}
        atmosphereCurve
        {
            key = 0 10500 0 0
        }
        @PROPELLANT[IntakeAir]
        {
            @ratio = 10
        }
        !velCurve {}
        velCurve
        {
            key = 0 1 0 0
            key = 0.3 0.96 0 0
            key = 0.6 0.85 0 0
            key = 0.9 0.84 0 0
            key = 1.3 0.84 0 0
            key = 1.674 0.84 -0.876726 -0.876726
            key = 2.5 0 0 0
        }
    }
}

