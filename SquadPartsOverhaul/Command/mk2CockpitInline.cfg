// Modified 2026-06-09
// MK2 ×1.5 scale: mass 1.2→2.4, MFT 400→1350, EC 15000→50625

@PART[mk2Cockpit_Inline|mk2Cockpit_Standard]:Final
{
    %rescaleFactor = 1.5
    @maxTemp = 2500
    %skinMaxTemp = 3600
    @mass = 2.4
    @cost = 7000
    @entryCost = 200000
    @description ^= :$:  Life Support System rated for 9 days for each crew member.:
    @MODULE[ModuleCommand]
    {
        minimumCrew = 0
        RESOURCE
        {
            name = ElectricCharge
            rate = 0.1  //360w
        }
    }
    @MODULE[ModuleReactionWheel]
    {
        @PitchTorque = 51
        @YawTorque = 51
        @RollTorque = 51
    }
    @MODULE[ModuleInventoryPart]
    {
        @InventorySlots = 7
        @packedVolumeLimit = 506
    }
    !RESOURCE,*{}
    !MODULE[ModuleFuelTanks] {}
    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 1350
        basemass = -1
        TANK
        {
            name = Food
            amount = Full
            maxAmount = 5.84928
            @maxAmount *= 9
            @maxAmount *= #$/CrewCapacity$
        }

        TANK
        {
            name = Water
            amount = Full
            maxAmount = 3.87072
            @maxAmount *= 9
            @maxAmount *= #$/CrewCapacity$
        }

        TANK
        {
            name = Oxygen
            amount = Full
            maxAmount = 591.84
            @maxAmount *= 9
            @maxAmount *= #$/CrewCapacity$
        }
        TANK
        {
            name = ElectricCharge
            amount = 50625
            maxAmount = 50625
        }
    }
    %MODULE[TweakScale]
    {
        %type = stack
        %defaultScale = 1.875
    }
}
