// Modified 2026-06-09
// MK2 ×1.5 scale — all values per-part, no wildcards

@PART[mk2CrewCabin]:FINAL
{
    %rescaleFactor = 1.5
    @maxTemp = 2500
    %skinMaxTemp = 3600
    @mass = 2.4
    @cost = 2000
    @entryCost = 120000
    MODULE
    {
        name = ModuleReactionWheel
        actionGUIName = Toggle RW
        PitchTorque = 84
        YawTorque = 34
        RollTorque = 10
        RESOURCE
        {
            name = ElectricCharge
            rate = 0.2
        }
    }
    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 1013
        basemass = -1
    }
    @MODULE[ModuleInventoryPart]
    {
        @InventorySlots = 14
        @packedVolumeLimit = 675
    }
    %MODULE[TweakScale]
    {
        %type = stack
        %defaultScale = 1.875
    }
}

@PART[mk2DockingPort]:FINAL
{
    %rescaleFactor = 1.5
    @mass = 0.60
    @cost = 1700
    @entryCost = 110000
    @maxTemp = 2500
    %skinMaxTemp = 3600
    @MODULE[ModuleDockingNode]
    {
        @nodeType = Armor1875
    }
    @MODULE[TweakScale]
    {
        @type = stack
        @defaultScale = 1.875
    }
    !RESOURCE,*{}
    !MODULE[ModuleFuelTanks] {}
    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 5063
        basemass = -1
        TANK
        {
            name = Food
            amount = Full
            maxAmount = 5.84928
            @maxAmount *= 80
        }

        TANK
        {
            name = Water
            amount = Full
            maxAmount = 3.87072
            @maxAmount *= 80
        }

        TANK
        {
            name = Oxygen
            amount = Full
            maxAmount = 591.84
            @maxAmount *= 80
        }

        TANK
        {
            name = ElectricCharge
            amount = Full
            maxAmount = 50625
        }
    }
}

